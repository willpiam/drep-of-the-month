<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DRep & SPO of the Month</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --line: #334155;
        --accent: #38bdf8;
        --accent-2: #22c55e;
        --radius: 16px;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --card: #ffffff;
          --text: #0f172a;
          --muted: #475569;
          --line: #e2e8f0;
          --accent: #0284c7;
          --accent-2: #16a34a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  </head>
  <body>
    <main>
      <dotm-app></dotm-app>
    </main>

    <script>
      class DotmQr extends HTMLElement {
        static get observedAttributes() {
          return ["value"];
        }

        constructor() {
          super();
          this.attachShadow({ mode: "open" });
        }

        connectedCallback() {
          this.render();
        }

        attributeChangedCallback() {
          this.render();
        }

        render() {
          const value = this.getAttribute("value") || "";
          const root = this.shadowRoot;
          if (!root) return;

          const styles = `
            <style>
              .qr-wrap {
                width: 180px;
                min-height: 180px;
                margin: 0 auto;
                border: 1px solid var(--line);
                border-radius: 12px;
                background: #fff;
                display: grid;
                place-items: center;
                overflow: hidden;
              }
              .empty {
                font-size: 0.875rem;
                color: #64748b;
                text-align: center;
                padding: 12px;
              }
            </style>
          `;

          if (!value || typeof window.qrcode !== "function") {
            root.innerHTML = `${styles}<div class="qr-wrap"><div class="empty">QR unavailable</div></div>`;
            return;
          }

          const qr = window.qrcode(0, "M");
          qr.addData(value);
          qr.make();
          root.innerHTML = `${styles}<div class="qr-wrap">${qr.createSvgTag({ scalable: true })}</div>`;
        }
      }
      customElements.define("dotm-qr", DotmQr);

      class DotmCard extends HTMLElement {
        constructor() {
          super();
          this.attachShadow({ mode: "open" });
        }

        set data(value) {
          this._data = value;
          this.render();
        }

        getCardanoScanUrl(entry) {
          if (!entry) return "#";
          if (entry.type === "drep") {
            return `https://cardanoscan.io/dRep/${encodeURIComponent(entry.id)}`;
          }
          return `https://cardanoscan.io/pool/${encodeURIComponent(entry.id)}`;
        }

        formatDate(value) {
          if (!value) return "Unknown date";
          const date = new Date(value);
          if (Number.isNaN(date.getTime())) return "Unknown date";
          return new Intl.DateTimeFormat(undefined, {
            year: "numeric",
            month: "long",
            day: "numeric",
            timeZone: "UTC"
          }).format(date);
        }

        platformLabel(platform) {
          const raw = (platform || "").toLowerCase();
          const map = {
            twitter: "X",
            x: "X",
            github: "GitHub",
            discord: "Discord",
            telegram: "Telegram",
            youtube: "YouTube",
            website: "Website"
          };
          return map[raw] || (platform || "Social");
        }

        render() {
          const root = this.shadowRoot;
          if (!root) return;

          const payload = this._data || {};
          const title = payload.sectionTitle || "Featured";
          const entry = payload.entry || null;
          const previousCount = Number(payload.previousCount || 0);

          const style = `
            <style>
              :host {
                display: block;
              }
              .card {
                background: var(--card);
                border: 1px solid var(--line);
                border-radius: var(--radius);
                padding: 18px;
                height: 100%;
              }
              h2 {
                margin: 0 0 10px;
                font-size: 1.1rem;
              }
              h3 {
                margin: 0 0 6px;
                font-size: 1.35rem;
                line-height: 1.3;
              }
              .meta {
                color: var(--muted);
                font-size: 0.92rem;
                margin-bottom: 12px;
              }
              .id {
                display: block;
                margin: 10px 0 14px;
                font-size: 0.83rem;
                color: var(--muted);
                word-break: break-all;
              }
              .actions {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin: 14px 0;
              }
              button,
              a.action {
                border-radius: 10px;
                padding: 10px 14px;
                border: 1px solid var(--line);
                background: transparent;
                color: var(--text);
                text-decoration: none;
                font-size: 0.9rem;
                cursor: pointer;
              }
              button {
                background: color-mix(in srgb, var(--accent) 22%, transparent);
                border-color: color-mix(in srgb, var(--accent) 44%, var(--line));
              }
              .count {
                font-size: 0.9rem;
                margin: 12px 0 8px;
                color: var(--muted);
              }
              ul {
                margin: 10px 0 0;
                padding-left: 18px;
              }
              li {
                margin: 5px 0;
              }
              .socials {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 12px;
              }
              .social {
                font-size: 0.86rem;
                padding: 6px 10px;
                border-radius: 999px;
                border: 1px solid var(--line);
                color: var(--text);
                text-decoration: none;
              }
              .empty {
                color: var(--muted);
                margin: 8px 0 0;
              }
            </style>
          `;

          if (!entry) {
            root.innerHTML = `
              ${style}
              <article class="card">
                <h2>${title}</h2>
                <p class="empty">No entry available for this date range.</p>
              </article>
            `;
            return;
          }

          const bulletPoints = Array.isArray(entry.bulletPoints) ? entry.bulletPoints : [];
          const socials = Array.isArray(entry.socials) ? entry.socials : [];
          const cardanoScanUrl = this.getCardanoScanUrl(entry);

          root.innerHTML = `
            ${style}
            <article class="card">
              <h2>${title}</h2>
              <h3>${entry.name || "Unnamed"}</h3>
              <div class="meta">Starts ${this.formatDate(entry.timestamp)}</div>
              <dotm-qr value="${entry.id || ""}"></dotm-qr>
              <small class="id">${entry.id || ""}</small>
              <div class="actions">
                <button type="button" aria-label="Delegate to ${entry.name || "featured"}">Delegate</button>
                <a class="action" href="${cardanoScanUrl}" target="_blank" rel="noreferrer noopener">View on Cardano Scan</a>
              </div>
              <p class="count">Previously featured ${previousCount} time(s)</p>
              ${
                bulletPoints.length
                  ? `<ul>${bulletPoints.map((item) => `<li>${item}</li>`).join("")}</ul>`
                  : `<p class="empty">No notes yet.</p>`
              }
              ${
                socials.length
                  ? `<div class="socials">${socials
                      .map(
                        (s) =>
                          `<a class="social" href="${s.url}" target="_blank" rel="noreferrer noopener">${this.platformLabel(
                            s.platform
                          )}</a>`
                      )
                      .join("")}</div>`
                  : ""
              }
            </article>
          `;
        }
      }
      customElements.define("dotm-card", DotmCard);

      class DotmApp extends HTMLElement {
        constructor() {
          super();
          this.attachShadow({ mode: "open" });
          this.state = {
            loading: true,
            error: "",
            snapshots: [],
            index: 0
          };
        }

        connectedCallback() {
          this.load();
        }

        async load() {
          try {
            const response = await fetch("./data.json", { cache: "no-store" });
            if (!response.ok) {
              throw new Error(`Failed to load data.json (${response.status})`);
            }
            const raw = await response.json();
            const now = new Date();

            const entries = (Array.isArray(raw) ? raw : [])
              .filter((entry) => entry && typeof entry === "object")
              .filter((entry) => {
                const date = new Date(entry.timestamp);
                return !Number.isNaN(date.getTime()) && date.getTime() <= now.getTime();
              })
              .filter((entry) => entry.type === "drep" || entry.type === "spo")
              .sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());

            const drepEntries = entries.filter((entry) => entry.type === "drep");
            const spoEntries = entries.filter((entry) => entry.type === "spo");
            const maxLen = Math.max(drepEntries.length, spoEntries.length);

            const snapshots = [];
            for (let i = 0; i < maxLen; i += 1) {
              snapshots.push({
                drep: drepEntries[i] || null,
                spo: spoEntries[i] || null
              });
            }

            this.state = {
              loading: false,
              error: "",
              snapshots,
              index: 0
            };
          } catch (error) {
            this.state = {
              loading: false,
              error: error instanceof Error ? error.message : "Unable to load data",
              snapshots: [],
              index: 0
            };
          }
          this.render();
        }

        previousCount(entry) {
          if (!entry) return 0;
          const { snapshots, index } = this.state;
          let count = 0;
          for (let i = index + 1; i < snapshots.length; i += 1) {
            const candidate = snapshots[i][entry.type];
            if (candidate && candidate.id === entry.id) {
              count += 1;
            }
          }
          return count;
        }

        navigateNextOldest() {
          this.state.index = Math.min(this.state.index + 1, this.state.snapshots.length - 1);
          this.render();
        }

        navigateCurrent() {
          this.state.index = 0;
          this.render();
        }

        render() {
          const root = this.shadowRoot;
          if (!root) return;

          const { loading, error, snapshots, index } = this.state;

          const style = `
            <style>
              .header {
                margin-bottom: 18px;
              }
              h1 {
                font-size: clamp(1.35rem, 2.2vw, 2rem);
                margin: 0 0 8px;
                line-height: 1.2;
              }
              .subtitle {
                color: var(--muted);
                margin: 0;
              }
              .grid {
                display: grid;
                grid-template-columns: 1fr;
                row-gap: clamp(26px, 5vh, 48px);
                column-gap: 14px;
                align-items: start;
              }
              @media (min-width: 768px) {
                .grid {
                  grid-template-columns: 1fr 1fr;
                  row-gap: 18px;
                }
              }
              .footer {
                margin-top: clamp(42px, 9vh, 110px);
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                align-items: center;
                justify-content: center;
              }
              .footer button {
                border-radius: 10px;
                padding: 10px 14px;
                border: 1px solid var(--line);
                cursor: pointer;
                background: transparent;
                color: var(--text);
              }
              .footer .primary {
                background: color-mix(in srgb, var(--accent-2) 22%, transparent);
                border-color: color-mix(in srgb, var(--accent-2) 44%, var(--line));
              }
              .status {
                color: var(--muted);
                font-size: 0.9rem;
                width: 100%;
                text-align: center;
              }
              .panel {
                border: 1px solid var(--line);
                border-radius: var(--radius);
                padding: 16px;
                background: var(--card);
                color: var(--text);
              }
            </style>
          `;

          if (loading) {
            root.innerHTML = `${style}<section class="panel">Loading...</section>`;
            return;
          }

          if (error) {
            root.innerHTML = `${style}<section class="panel">Error: ${error}</section>`;
            return;
          }

          const snapshot = snapshots[index] || { drep: null, spo: null };
          const statusText = snapshots.length
            ? `Showing entry set ${index + 1} of ${snapshots.length}`
            : "No entries available";

          root.innerHTML = `
            ${style}
            <section class="header">
              <h1>DRep & SPO of the Month</h1>
              <p class="subtitle">Scan the QR code or use the delegate button to support this month's featured members.</p>
            </section>
            <section class="grid">
              <dotm-card id="spo-card"></dotm-card>
              <dotm-card id="drep-card"></dotm-card>
            </section>
            <section class="footer">
              <button id="previous" class="primary" type="button">Previous Entries</button>
              <button id="current" type="button">Current</button>
              <span class="status">${statusText}</span>
            </section>
          `;

          const spoCard = root.getElementById("spo-card");
          const drepCard = root.getElementById("drep-card");
          const previousButton = root.getElementById("previous");
          const currentButton = root.getElementById("current");

          if (spoCard) {
            spoCard.data = {
              sectionTitle: "SPO of the Month",
              entry: snapshot.spo,
              previousCount: this.previousCount(snapshot.spo)
            };
          }

          if (drepCard) {
            drepCard.data = {
              sectionTitle: "DRep of the Month",
              entry: snapshot.drep,
              previousCount: this.previousCount(snapshot.drep)
            };
          }

          if (previousButton) {
            previousButton.disabled = index >= snapshots.length - 1 || snapshots.length === 0;
            previousButton.addEventListener("click", () => this.navigateNextOldest());
          }

          if (currentButton) {
            currentButton.disabled = index === 0;
            currentButton.addEventListener("click", () => this.navigateCurrent());
          }
        }
      }
      customElements.define("dotm-app", DotmApp);
    </script>
  </body>
</html>
