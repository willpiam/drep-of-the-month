<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DRep & SPO of the Month</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --line: #334155;
        --accent: #38bdf8;
        --accent-2: #22c55e;
        --radius: 16px;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --card: #ffffff;
          --text: #0f172a;
          --muted: #475569;
          --line: #e2e8f0;
          --accent: #0284c7;
          --accent-2: #16a34a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
    </style>
  </head>
